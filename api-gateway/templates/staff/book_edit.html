{% extends "base.html" %}
{% block title %}Edit book{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-slate-900 mb-6">Edit book #{{ book.id }}</h1>
    <form action="{% url 'staff_book_edit' book.id %}" method="post" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
            <input type="text" name="title" value="{{ book.title }}" required class="w-full border border-slate-300 rounded-lg px-3 py-2" />
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Author</label>
            <input type="text" name="author" value="{{ book.author }}" required class="w-full border border-slate-300 rounded-lg px-3 py-2" />
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Price</label>
            <input type="number" name="price" step="0.01" value="{{ book.price }}" required class="w-full border border-slate-300 rounded-lg px-3 py-2" />
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Stock</label>
            <input type="number" name="stock" value="{{ book.stock }}" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/40" />
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Image URL</label>
            <input type="url" name="image_url" value="{{ book.image_url|default:'' }}" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/40" placeholder="https://..." />
        </div>
        <div class="flex gap-2 pt-2">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Save</button>
            <a href="{% url 'staff_books' %}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
