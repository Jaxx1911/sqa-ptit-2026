services:
  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    depends_on:
      - book-service
  order-service:
    build: ./order-service
    ports:
      - "8004:8000"
    depends_on:
      - cart-service
      - book-service
      - pay-service
      - ship-service
  pay-service:
    build: ./pay-service
    ports:
      - "8005:8000"
  ship-service:
    build: ./ship-service
    ports:
      - "8006:8000"
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - book-service
      - cart-service
      - order-service
      - pay-service
      - ship-service